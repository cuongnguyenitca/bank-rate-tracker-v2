name: Thu thap lai suat tu dong

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      bank:
        description: 'Ma ngan hang (de trong = tat ca)'
        required: false
        default: ''

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd scripts
          npm install @supabase/supabase-js

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TARGET_BANK: ${{ github.event.inputs.bank }}
        run: node scripts/scrape-all.mjs
